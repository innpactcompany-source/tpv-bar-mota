<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bar Piscina · Mota del Cuervo — Comandas</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E52D9">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bar Piscina">
<meta name="mobile-web-app-capable" content="yes">
<style>
  /* ============================================================
     BAR PISCINA — Gestor de comandas (v3, sincronizado)
     Igual que antes + se sincroniza entre móviles con Supabase.
     Sin configurar funciona en modo LOCAL (un solo móvil).
     EDITAR CARTA -> objeto MENU. CONFIGURAR NUBE -> arriba del script.
     ============================================================ */
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --blue:#1E52D9; --blue-dark:#1642B0; --blue-tint:#F1F5FF; --blue-2:#E1E9FD;
    --blue-line:#CFDCFB; --ink:#14213D; --muted:#7686A6; --white:#FFFFFF;
    --danger:#D64545; --shadow:0 6px 20px rgba(30,82,217,.14);
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{ font-family:'Inter',system-ui,-apple-system,sans-serif; color:var(--ink); background:var(--white); overflow:hidden; }
  .display{ font-family:'Anton','Archivo Black',Impact,sans-serif; letter-spacing:.4px; text-transform:uppercase; font-weight:400; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  input{ font-family:inherit; }
  .num{ font-variant-numeric:tabular-nums; }

  .app{ display:flex; flex-direction:column; height:100dvh; }
  #hdr{ flex:0 0 auto; }
  #main{ flex:1 1 auto; overflow-y:auto; min-height:0; }

  /* ================= CABECERA ================= */
  .hb{ background:var(--blue); color:#fff; padding:12px 16px 14px; display:flex; align-items:center; gap:12px; }
  .hb .mill{ width:40px; height:40px; flex:0 0 auto; }
  .hb .brand{ display:flex; flex-direction:column; line-height:.92; }
  .hb .brand .t1{ font-size:11px; letter-spacing:2.5px; opacity:.85; }
  .hb .brand .t2{ font-size:22px; }
  .hb .caja{ margin-left:auto; display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.12); padding:7px 8px 7px 12px; border-radius:14px; }
  .hb .caja .cl{ font-size:10px; letter-spacing:1.5px; opacity:.8; }
  .hb .caja .cv{ font-size:17px; font-weight:800; }
  .hb .caja .cc{ font-size:11px; opacity:.85; }
  .hb .caja .creset{ font-size:12px; color:#fff; background:rgba(255,255,255,.16); padding:6px 10px; border-radius:10px; }
  .hb .caja .creset:active{ background:rgba(255,255,255,.3); }
  .hb .logo{ display:flex; align-items:center; gap:12px; background:none; padding:0; transition:opacity .12s; }
  .hb .logo:active{ opacity:.7; }

  /* punto de conexión */
  .dot{ width:9px; height:9px; border-radius:50%; background:#3ED598; box-shadow:0 0 0 3px rgba(62,213,152,.20); flex:0 0 auto; }
  .dot.off{ background:#F26D6D; box-shadow:0 0 0 3px rgba(242,109,109,.20); }
  .ht .dot{ margin-left:6px; }

  /* modal de confirmación */
  .overlay{ position:fixed; inset:0; background:rgba(20,33,61,.5); display:flex; align-items:center; justify-content:center; padding:24px; z-index:100; animation:fade .12s ease; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  .modal{ background:#fff; border-radius:18px; padding:22px 20px 16px; width:100%; max-width:360px; box-shadow:0 20px 50px rgba(20,33,61,.35); }
  .m-msg{ font-size:18px; font-weight:700; line-height:1.3; }
  .m-msg b{ color:var(--blue); }
  .m-sub{ font-size:13.5px; color:var(--muted); margin-top:7px; line-height:1.4; }
  .m-actions{ display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:18px; }
  .m-btn{ padding:14px; border-radius:12px; font-weight:800; font-size:15px; }
  .m-cancel{ background:var(--blue-tint); color:var(--ink); }
  .m-cancel:active{ background:var(--blue-2); }
  .m-ok{ background:var(--blue); color:#fff; }
  .m-ok:active{ background:var(--blue-dark); }
  .m-danger{ background:var(--danger); color:#fff; }
  .m-danger:active{ filter:brightness(.9); }
  .ex-list{ margin-top:14px; max-height:44vh; overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
  .ex-row{ display:flex; align-items:center; gap:10px; background:var(--blue-tint); border-radius:11px; padding:8px 10px; }
  .ex-i{ flex:1 1 auto; display:flex; flex-direction:column; }
  .ex-n{ font-size:15px; font-weight:600; }
  .ex-p{ font-size:12px; color:var(--muted); }
  .ex-total{ display:flex; align-items:center; justify-content:space-between; margin-top:14px; padding-top:12px; border-top:1px solid var(--blue-line); }
  .ex-total .exl{ font-size:15px; font-weight:700; }
  .ex-total .ex-tv{ font-size:24px; font-weight:800; color:var(--blue); }

  /* cabecera de detalle de mesa */
  .ht{ background:var(--blue); color:#fff; padding:10px 12px; display:flex; align-items:center; gap:10px; }
  .ht .back{ width:40px; height:40px; border-radius:12px; background:rgba(255,255,255,.14); font-size:22px; display:grid; place-items:center; flex:0 0 auto; }
  .ht .back:active{ background:rgba(255,255,255,.3); }
  .ht .thead{ display:flex; flex-direction:column; min-width:0; flex:1 1 auto; }
  .ht .tname{ font-size:22px; line-height:1; }
  .ht .tsub{ background:rgba(255,255,255,.14); border:none; color:#fff; border-radius:9px; padding:5px 9px; font-size:13px; margin-top:5px; width:100%; max-width:280px; }
  .ht .tsub::placeholder{ color:rgba(255,255,255,.6); }
  .ht .ttot{ font-size:22px; font-weight:800; flex:0 0 auto; }

  /* segmentado Cuenta/Añadir */
  .seg{ display:flex; gap:6px; padding:10px 12px; background:var(--white); position:sticky; top:0; z-index:5; border-bottom:1px solid var(--blue-line); }
  .seg button{ flex:1; padding:11px; border-radius:12px; font-weight:800; font-size:15px; background:var(--blue-tint); color:var(--blue); }
  .seg button.on{ background:var(--blue); color:#fff; box-shadow:var(--shadow); }

  /* ================= TABLERO ================= */
  .board-title{ padding:16px 16px 6px; font-size:15px; color:var(--muted); font-weight:700; letter-spacing:.3px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:11px; padding:6px 16px 24px; }
  .mesa{ position:relative; background:var(--white); border:2px solid var(--blue-line); border-radius:16px; padding:14px; min-height:92px; display:flex; flex-direction:column; justify-content:space-between; text-align:left; transition:transform .06s,border-color .12s; }
  .mesa:active{ transform:scale(.97); }
  .mesa .mtop{ display:flex; align-items:baseline; justify-content:space-between; gap:6px; }
  .mesa .mname{ font-size:19px; }
  .mesa .mtot{ font-size:15px; font-weight:800; color:var(--blue); }
  .mesa .msub{ font-size:12px; color:var(--muted); margin-top:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mesa.has{ border-color:var(--blue); background:var(--blue-tint); }
  .mesa.has .mname{ color:var(--blue); }
  .mesa.add{ border-style:dashed; color:var(--blue); align-items:center; justify-content:center; min-height:92px; }
  .mesa.add .plus{ font-size:30px; line-height:1; }
  .mesa.add .al{ font-size:12px; font-weight:700; margin-top:2px; }

  /* ================= CUENTA ================= */
  .pane{ padding:12px 12px 0; }
  .empty{ text-align:center; color:var(--muted); font-size:14px; padding:44px 20px; line-height:1.5; }
  .line{ display:flex; align-items:center; gap:8px; background:var(--blue-tint); border-radius:12px; padding:8px 8px 8px 12px; margin-bottom:8px; }
  .line .li{ flex:1 1 auto; min-width:0; }
  .line .ln{ font-size:15px; font-weight:600; line-height:1.25; }
  .line .lp{ font-size:12px; color:var(--muted); }
  .stepper{ display:flex; align-items:center; gap:3px; flex:0 0 auto; }
  .stepper button{ width:32px; height:32px; border-radius:9px; background:#fff; color:var(--blue); font-size:20px; font-weight:700; display:grid; place-items:center; border:1px solid var(--blue-line); }
  .stepper button:active{ background:var(--blue-2); }
  .stepper .q{ min-width:22px; text-align:center; font-weight:800; font-size:15px; }
  .line .lsub{ width:58px; text-align:right; font-weight:800; font-size:14px; flex:0 0 auto; }
  .line .del{ width:26px; height:32px; color:var(--muted); font-size:15px; flex:0 0 auto; }
  .line .del:active{ color:var(--danger); }

  /* pie fijo (cuenta y añadir) */
  .foot{ position:sticky; bottom:0; background:var(--white); border-top:1px solid var(--blue-line); padding:12px 14px calc(12px + env(safe-area-inset-bottom)); }
  .total{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:11px; }
  .total .tl{ font-size:15px; font-weight:700; }
  .total .tv{ font-size:32px; color:var(--blue); }
  .actions{ display:grid; grid-template-columns:1fr 1.7fr; gap:9px; }
  .btn{ padding:15px; border-radius:13px; font-weight:800; font-size:15px; text-align:center; }
  .btn-clear{ background:#fff; color:var(--danger); border:2px solid #f2cfcf; }
  .btn-clear:active{ background:#fdeaea; }
  .btn-pay{ background:var(--blue); color:#fff; box-shadow:var(--shadow); }
  .btn-pay:active{ background:var(--blue-dark); }
  .btn:disabled{ opacity:.4; box-shadow:none; }
  .btn-view{ background:var(--blue); color:#fff; box-shadow:var(--shadow); }
  .btn-view:active{ background:var(--blue-dark); }

  /* ================= AÑADIR ================= */
  .fb{ display:flex; gap:8px; padding:12px 12px 4px; }
  .fb button{ flex:1; padding:12px; border-radius:12px; font-weight:800; font-size:15px; background:var(--blue-tint); color:var(--blue); }
  .fb button.on{ background:var(--blue); color:#fff; }
  .acc-wrap{ padding:6px 12px 0; }
  .acc{ border:1.5px solid var(--blue-line); border-radius:13px; margin-bottom:10px; overflow:hidden; }
  .acc-h{ width:100%; display:flex; align-items:center; justify-content:space-between; padding:14px 14px; font-weight:800; font-size:16px; color:var(--ink); background:var(--white); }
  .acc-h .chev{ transition:transform .2s; color:var(--blue); font-size:14px; }
  .acc.open .acc-h{ color:var(--blue); background:var(--blue-tint); }
  .acc.open .acc-h .chev{ transform:rotate(90deg); }
  .acc-body{ display:none; padding:10px; grid-template-columns:1fr 1fr; gap:8px; background:var(--blue-tint); }
  .acc.open .acc-body{ display:grid; }
  .acc-item{ position:relative; background:#fff; border:1.5px solid var(--blue-line); border-radius:11px; padding:10px 11px; text-align:left; display:flex; flex-direction:column; gap:5px; min-height:58px; justify-content:space-between; transition:transform .06s; }
  .acc-item:active{ transform:scale(.95); border-color:var(--blue); }
  .acc-item .ain{ font-size:13.5px; font-weight:600; line-height:1.15; }
  .acc-item .aip{ font-size:14px; font-weight:800; color:var(--blue); }
  .acc-item .badge{ position:absolute; top:-8px; right:-8px; min-width:22px; height:22px; padding:0 6px; background:var(--blue); color:#fff; border-radius:11px; font-size:12px; font-weight:800; display:none; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(30,82,217,.35); }
  .acc-item.in .badge{ display:flex; }

  /* ===== recuento / tickets / productos ===== */
  .rpt{ padding:14px 12px 24px; }
  .rsum{ display:flex; flex-direction:column; gap:12px; }
  .rcard{ background:var(--blue-tint); border-radius:16px; padding:16px; display:flex; flex-direction:column; gap:4px; }
  .rcard .rk{ font-size:13px; color:var(--muted); font-weight:700; }
  .rcard .rv{ font-size:30px; font-weight:800; color:var(--blue); }
  .rcard .rd{ font-size:12px; color:var(--muted); }
  .rcard.big{ background:var(--blue); } .rcard.big .rk{ color:#cfe0ff; } .rcard.big .rv{ color:#fff; }
  .tlist{ display:flex; flex-direction:column; gap:8px; }
  .tk{ background:var(--blue-tint); border-radius:12px; overflow:hidden; }
  .tk-head{ width:100%; display:flex; align-items:baseline; gap:10px; padding:11px 13px; text-align:left; }
  .tk-m{ font-weight:800; }
  .tk-h{ font-size:12px; color:var(--muted); }
  .tk-t{ margin-left:auto; font-weight:800; color:var(--blue); }
  .tk-chev{ font-size:11px; color:var(--blue); transition:transform .2s; }
  .tk.open .tk-chev{ transform:rotate(90deg); }
  .tk-body{ display:none; padding:0 13px 10px; }
  .tk.open .tk-body{ display:block; }
  .tkl{ display:flex; justify-content:space-between; gap:10px; padding:6px 0; border-top:1px solid var(--blue-line); font-size:13.5px; }
  .tkl .tkls{ font-weight:700; color:var(--blue); flex:0 0 auto; }
  .tk-acts{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .tka{ padding:11px 8px; border-radius:10px; font-weight:800; font-size:13px; background:#fff; border:1.5px solid var(--blue-line); }
  .tka.undo{ color:var(--blue); }
  .tka.undo:active{ background:var(--blue-2); }
  .tka.del{ color:var(--danger); border-color:#f2cfcf; }
  .tka.del:active{ background:#fdeaea; }
  .plist{ display:flex; flex-direction:column; gap:18px; }
  .psec h3{ font-size:19px; color:var(--blue); margin-bottom:8px; }
  .prow{ display:flex; align-items:center; justify-content:space-between; padding:9px 4px; border-bottom:1px solid var(--blue-line); }
  .prow .pn{ font-size:14.5px; }
  .prow .pq{ font-weight:800; color:var(--blue); }
  /* botón cobro parcial */
  .btn-split{ width:100%; background:#fff; color:var(--blue); border:2px solid var(--blue-line); margin-bottom:9px; }
  .btn-split:active{ background:var(--blue-tint); }
  /* editar / eliminar mesas */
  .board-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 16px 6px; }
  .board-head .board-title{ padding:0; }
  .edit-toggle{ font-size:13px; font-weight:700; color:var(--blue); background:var(--blue-tint); padding:7px 14px; border-radius:20px; }
  .edit-toggle:active{ background:var(--blue-2); }
  .mesa.editing{ border-color:var(--danger); background:#fdeaea; }
  .mesa .mdel{ position:absolute; top:8px; right:10px; color:var(--danger); font-size:16px; font-weight:800; }
  /* caja clicable */
  .hb .caja{ cursor:pointer; border:none; margin-left:0; }
  .hb .caja .cchev{ font-size:20px; opacity:.7; margin-left:2px; line-height:1; }

  /* menú del molino (hub) */
  .hub{ padding:18px 16px; display:flex; flex-direction:column; gap:14px; }
  .hubbtn{ background:var(--blue-tint); border:2px solid var(--blue-line); border-radius:18px; padding:22px 18px; text-align:left; display:flex; flex-direction:column; gap:6px; transition:transform .06s; }
  .hubbtn:active{ transform:scale(.98); border-color:var(--blue); }
  .hubbtn .hubt{ font-size:26px; color:var(--blue); }
  .hubbtn .hubd{ font-size:13px; color:var(--muted); }

  /* ===== COCINA (KDS) ===== */
  :root{ --kpend:#E23A2E; --kmar:#F08C00; --klis:#2F9E44; --kserv:#8B97B8; }
  .kds{ display:flex; flex-direction:column; height:100%; min-height:0; }
  .kds-bar{ display:flex; align-items:center; gap:14px; padding:8px 14px; background:#fff; border-bottom:1px solid var(--blue-line); flex:0 0 auto; }
  .kds-stat{ display:flex; flex-direction:column; align-items:center; }
  .kds-stat b{ font-size:22px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; }
  .kds-stat span{ font-size:8.5px; letter-spacing:.12em; color:var(--muted); font-weight:700; }
  .kds-stat.p b{ color:var(--kpend); } .kds-stat.m b{ color:var(--kmar); } .kds-stat.l b{ color:var(--klis); }
  .kds-spacer{ flex:1; }
  .kds-mute{ padding:8px 12px; border-radius:10px; background:var(--blue-tint); color:var(--blue); font-weight:700; font-size:12px; }
  .kds-clock{ font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--muted); }
  .prodline{ display:flex; align-items:center; gap:8px; padding:8px 14px; background:#fff; border-bottom:1px solid var(--blue-line); overflow-x:auto; scrollbar-width:none; flex:0 0 auto; }
  .prodline::-webkit-scrollbar{ display:none; }
  .prodline:empty{ display:none; }
  .pl-lbl{ flex:0 0 auto; font-size:9px; letter-spacing:.18em; color:var(--muted); font-weight:800; }
  .pl-tag{ flex:0 0 auto; display:flex; align-items:center; gap:6px; background:var(--blue-tint); border:1.5px solid var(--blue-line); padding:4px 11px; border-radius:999px; font-size:13px; font-weight:600; white-space:nowrap; }
  .pl-tag b{ font-size:16px; font-weight:800; color:var(--blue); }
  .kboard{ flex:1 1 auto; display:grid; grid-template-columns:1fr 1fr 1fr; overflow:hidden; min-height:0; }
  .kcol{ display:flex; flex-direction:column; min-width:0; min-height:0; border-right:1px solid var(--blue-line); }
  .kcol:last-child{ border-right:none; }
  .kcol .col-h{ display:flex; align-items:center; gap:8px; padding:10px 13px; font-weight:800; font-size:13px; letter-spacing:.06em; color:#fff; flex:0 0 auto; }
  .kcol[data-s="pendiente"] .col-h{ background:var(--kpend); }
  .kcol[data-s="en_marcha"] .col-h{ background:var(--kmar); }
  .kcol[data-s="lista"] .col-h{ background:var(--klis); }
  .kcol .col-h .n{ margin-left:auto; background:rgba(255,255,255,.25); border-radius:8px; padding:1px 9px; font-size:13px; }
  .kcol .col-body{ flex:1 1 auto; overflow-y:auto; padding:11px; display:flex; flex-direction:column; gap:11px; min-height:0; }
  .korder{ background:#fff; border:1.5px solid var(--blue-line); border-left:6px solid var(--muted); border-radius:13px; overflow:hidden; box-shadow:var(--shadow); }
  .korder[data-s="pendiente"]{ border-left-color:var(--kpend); }
  .korder[data-s="en_marcha"]{ border-left-color:var(--kmar); }
  .korder[data-s="lista"]{ border-left-color:var(--klis); }
  .korder.late{ animation:klate 1.2s ease-in-out infinite; }
  @keyframes klate{ 0%,100%{ box-shadow:var(--shadow); } 50%{ box-shadow:0 0 0 4px rgba(226,58,46,.35); } }
  .korder .o-top{ display:flex; align-items:center; gap:9px; padding:10px 12px 6px; }
  .korder .o-mesa{ font-weight:800; font-size:16px; color:var(--blue); }
  .korder .o-timer{ margin-left:auto; font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; }
  .t-ok{ color:var(--klis); } .t-warn{ color:var(--kmar); } .t-bad{ color:var(--kpend); }
  .korder .o-items{ padding:2px 12px 10px; display:flex; flex-direction:column; gap:8px; }
  .itrow{ border-radius:10px; padding:8px 10px 9px; border:1.5px solid var(--blue-line); background:var(--blue-tint); }
  .itrow.done{ opacity:.5; }
  .it-head{ display:flex; align-items:baseline; gap:8px; }
  .it-head .q{ font-weight:800; font-size:19px; color:var(--blue); min-width:26px; font-variant-numeric:tabular-nums; }
  .it-head .nm{ font-weight:700; font-size:15.5px; line-height:1.2; }
  .units{ display:flex; flex-wrap:wrap; gap:7px; margin-top:8px; align-items:center; }
  .uchip{ display:flex; align-items:center; gap:6px; min-height:40px; padding:6px 12px; border-radius:10px; color:#fff; font-weight:800; font-size:11px; letter-spacing:.04em; }
  .uchip b{ font-size:19px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; }
  .uchip.p{ background:var(--kpend); } .uchip.m{ background:var(--kmar); } .uchip.l{ background:var(--klis); }
  .uchip.s{ background:var(--kserv); opacity:.85; }
  .uchip:active:not(.s){ transform:scale(.95); }
  .it-undo{ margin-left:auto; width:36px; height:36px; border-radius:9px; background:#fff; border:1.5px solid var(--blue-line); color:var(--muted); font-size:14px; flex:0 0 auto; }
  .it-undo:disabled{ opacity:.25; }
  .korder .o-act{ display:flex; border-top:1.5px solid var(--blue-line); }
  .korder .o-act .main{ flex:1; padding:13px; font-weight:800; font-size:14px; letter-spacing:.06em; color:#fff; }
  .korder[data-s="pendiente"] .o-act .main{ background:var(--kpend); }
  .korder[data-s="en_marcha"] .o-act .main{ background:var(--kmar); }
  .korder[data-s="lista"] .o-act .main{ background:var(--klis); }

function openTable(n){ state.active=n; state.view='table'; state.fb='comida'; state.openCat=null; state.tab = tbl(n).lines.length?'cuenta':'add'; renderApp(); }

async function addItem(name,price){
  if(state.view==='barra'){ barraAdd(name,price); return; }
  const t=ensure(state.active); const ex=t.lines.find(l=>l.name===name);
  if(ex) ex.qty++; else t.lines.push({name,price,qty:1,km:0,kl:0,ks:0,creada_en:new Date().toISOString()});
  commit();
  await DB.addItem(state.active,name,price);
}
async function stepItem(name,d){
  const t=ensure(state.active); const l=t.lines.find(x=>x.name===name); if(!l)return;
  l.qty+=d; if(l.qty<=0) t.lines=t.lines.filter(x=>x.name!==name);
  commit();
  await DB.stepItem(state.active,name,d);
}
async function removeItem(name){
  const t=ensure(state.active); t.lines=t.lines.filter(x=>x.name!==name);
  commit();
  await DB.removeItem(state.active,name);
}
let subTimer=null;
function setSub(v){ ensure(state.active).sub=v; const m=state.active; clearTimeout(subTimer); subTimer=setTimeout(()=>DB.setSub(m,v),400); }
async function addTable(){
  const nums=state.tableList.filter(t=>/^Mesa \d+$/.test(t)).map(t=>+t.slice(5));
  const name='Mesa '+((nums.length?Math.max(...nums):0)+1);
  state.tableList.push(name); ensure(name); renderApp();
  await DB.addMesa(name);
}
function clearTable(){

  confirmDialog({ message:'¿Vaciar la cuenta de <b>'+state.active+'</b>?', sub:'Se borra todo el pedido. La mesa sigue abierta.', okLabel:'Vaciar', danger:true,
    onOk:async()=>{ const m=state.active; if(state.tables[m]) state.tables[m].lines=[]; renderCuenta(); await DB.clearMesa(m); } });
}
function payTable(){
  const m=state.active; const subt=tTotal(m); if(subt<=0)return;
  let tip=0;
  const chips=[['Sin propina',0],['+0,50',0.5],['+1',1],['+2',2]];
  const ov=el('div','overlay');
  ov.innerHTML='<div class="modal"><div class="m-msg">Cobrar · '+m+'</div>'+
    '<div class="m-sub">Subtotal '+eur(subt)+' · añade propina si hay</div>'+
    '<div class="tipchips">'+chips.map((c,i)=>'<button class="tipchip'+(i===0?' on':'')+'" data-t="'+c[1]+'">'+c[0]+'</button>').join('')+'</div>'+
    '<div class="tiprow"><span class="exl">Propina</span><input class="tipinp num" type="number" inputmode="decimal" step="0.10" min="0" value="0"> €</div>'+
    '<div class="ex-total"><span class="exl">Total a cobrar</span><span class="ex-tv num" id="pm-tot">'+eur(subt)+'</span></div>'+
    cashHTML()+
    '<div class="m-actions"><button class="m-btn m-cancel">Cancelar</button><button class="m-btn m-ok pm-ok">Cobrado</button></div></div>';
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  const inp=ov.querySelector('.tipinp');
  const paintCash=wireCash(ov,()=>subt+tip);
  const paint=()=>{ ov.querySelector('#pm-tot').textContent=eur(subt+tip);
    ov.querySelectorAll('.tipchip').forEach(b=>b.classList.toggle('on', parseFloat(b.dataset.t)===tip)); paintCash(); };
  ov.querySelectorAll('.tipchip').forEach(b=>{ b.onclick=()=>{ tip=parseFloat(b.dataset.t); inp.value=tip.toFixed(2); paint(); }; });
  inp.oninput=()=>{ tip=Math.max(0, parseFloat(inp.value)||0); paint(); };
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
  ov.querySelector('.m-cancel').onclick=close;
  ov.querySelector('.pm-ok').onclick=async()=>{
    const items=tbl(m).lines.map(l=>({name:l.name,qty:l.qty,price:l.price}));
    const sub=tbl(m).sub||''; const total=subt+tip;
    logTicket(m,total,items,sub,tip);
    if(state.tables[m]){ state.tables[m].lines=[]; state.tables[m].sub=''; }
    close(); back();
    DB.setSub(m,''); await DB.pay(m,total,items,sub,tip);
  };
}
/* guarda el ticket cobrado en memoria (caja + lista) */
function logTicket(mesa,total,items,sub,propina){
  if(state.caja.date!==today()){ state.caja={count:0,total:0,date:today()}; state.tickets=[]; }
  state.caja.count++; state.caja.total+=total;
  state.tickets.unshift({id:(CLOUD?null:Date.now()),mesa,sub:sub||'',total,propina:propina||0,items,at:new Date().toISOString()});
}

/* ---- corregir un cobro equivocado ---- */
function removeTicketLocal(t){
  const i=state.tickets.indexOf(t); if(i>=0) state.tickets.splice(i,1);
  state.caja.count=Math.max(0,state.caja.count-1);
  state.caja.total=Math.max(0,state.caja.total-t.total);
}
function undoTicket(t){
  confirmDialog({ message:'¿Devolver a <b>'+t.mesa+'</b>?', sub:'Se anula el ticket de '+eur(t.total)+' y los productos vuelven a la mesa para cobrarlos bien.', okLabel:'Devolver',
    onOk:async()=>{
      const m=t.mesa, tb=ensure(m);
      if(!state.tableList.includes(m)){ state.tableList.push(m); DB.addMesa(m); }
      (t.items||[]).forEach(i=>{ const ex=tb.lines.find(l=>l.name===i.name);
        if(ex) ex.qty+=i.qty; else tb.lines.push({name:i.name,price:i.price,qty:i.qty,km:0,kl:0,ks:0,creada_en:new Date().toISOString()}); });
      if(t.sub && !tb.sub){ tb.sub=t.sub; DB.setSub(m,t.sub); }
      removeTicketLocal(t); renderApp();
      await DB.restoreItems(m,t.items||[]);
      await DB.deleteTicket(t.id);
    }});
}
function deleteTicket(t){
  confirmDialog({ message:'¿Eliminar este ticket?', sub:eur(t.total)+' · se descuenta de la caja del día. Los productos NO vuelven a la mesa.', okLabel:'Eliminar', danger:true,
    onOk:async()=>{ removeTicketLocal(t); renderApp(); await DB.deleteTicket(t.id); }});
}

/* ================================================================
   MODO BARRA — venta rápida: se pide, se cobra y se registra.
   No abre mesa: cada cobro genera su ticket al momento.
   ================================================================ */
const bTotal=()=>state.barra.cart.reduce((s,l)=>s+l.price*l.qty,0);
function buzz(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms||12); }catch(e){} }
function barraAdd(name,price){
  const c=state.barra.cart, ex=c.find(l=>l.name===name);
  if(ex) ex.qty++; else c.push({name,price,qty:1});
  state.barra.recibido=0; buzz(); paintBarra();
}
function barraLess(name){
  const c=state.barra.cart, l=c.find(x=>x.name===name); if(!l) return;
  l.qty--; if(l.qty<=0) state.barra.cart=c.filter(x=>x.name!==name);
  state.barra.recibido=0; paintBarra();
}
function barraClear(){ state.barra.cart=[]; state.barra.recibido=0; paintBarra(); }
function barraRecibido(v){ state.barra.recibido=(state.barra.recibido===v?0:v); paintBarra(); }
async function barraPay(){
  const tot=bTotal(); if(tot<=0) return;
  const items=state.barra.cart.map(l=>({name:l.name,qty:l.qty,price:l.price}));
  logTicket('Barra',tot,items,'',0);
  barraClear(); buzz(25);
  showToast('Cobrado '+eur(tot),true);
  renderApp();
  const res=await DB.payQuick('Barra',tot,items) || {};
  if(res.error) errorDialog('No se pudo registrar la venta',res.error);
}

function vueltaHTML(recibido,total){
  if(!(recibido>0)) return '';
  return recibido>=total
    ? '<span class="bvl">Vuelta de '+eur(recibido)+'</span><span class="bvv num">'+eur(recibido-total)+'</span>'
    : '<span class="bvl falta">Faltan</span><span class="bvv num falta">'+eur(total-recibido)+'</span>';
}
function wireCash(ov,getTotal){
  let recibido=0;
  const inp=ov.querySelector('.cashinp');
  const paint=()=>{
    const v=ov.querySelector('[data-vuelta]');
    if(v) v.innerHTML=vueltaHTML(recibido,getTotal());
    ov.querySelectorAll('.bcashb').forEach(b=>b.classList.toggle('on', parseFloat(b.dataset.v)===recibido));
  };
  ov.querySelectorAll('.bcashb').forEach(b=>{ b.onclick=()=>{
    const v=parseFloat(b.dataset.v); recibido=(recibido===v?0:v);
    if(inp) inp.value = recibido?String(recibido):'';
    paint(); }; });
  if(inp) inp.oninput=()=>{ const n=parseFloat((inp.value||'').replace(',','.')); recibido=(isFinite(n)&&n>0)?n:0; paint(); };
  return paint;
}

async function addReserva(r){
  const tmp='tmp'+Date.now()+Math.random().toString(36).slice(2,6);
  const rec={ id:tmp, fecha:r.fecha, hora:r.hora||'', nombre:r.nombre, personas:r.personas, nota:r.nota };
  state.reservas.push(rec); sortReservas(); renderApp();
  const res=await DB.addReserva(rec) || {};
  if(res.error){
    state.reservas=state.reservas.filter(x=>x.id!==tmp); renderApp();
    errorDialog('No se pudo guardar la reserva', res.error);
  } else if(res.id!=null){
    const it=state.reservas.find(x=>x.id===tmp); if(it) it.id=res.id;
  }
}
function sortReservas(){ state.reservas.sort((a,b)=>((a.fecha||'')+' '+(a.hora||'')).localeCompare((b.fecha||'')+' '+(b.hora||''))); }
async function saveReserva(orig,r){
  const antes={fecha:orig.fecha,hora:orig.hora,nombre:orig.nombre,personas:orig.personas,nota:orig.nota};
  Object.assign(orig,{fecha:r.fecha,hora:r.hora||'',nombre:r.nombre,personas:r.personas,nota:r.nota});
  sortReservas(); renderApp();
  const res=await DB.updateReserva(orig) || {};
  if(res.error){ Object.assign(orig,antes); sortReservas(); renderApp(); errorDialog('No se pudo guardar el cambio', res.error); }
}
function deleteReserva(id){
  confirmDialog({ message:'¿Eliminar esta reserva?', okLabel:'Eliminar', danger:true,
    onOk:async()=>{ const copia=state.reservas.find(r=>r.id===id);
      state.reservas=state.reservas.filter(r=>r.id!==id); renderApp();
      const res=await DB.deleteReserva(id) || {};
      if(res.error && copia){ state.reservas.push(copia); sortReservas(); renderApp(); errorDialog('No se pudo eliminar', res.error); } } });
}

  const msg=(err && (err.message||err.hint||err.details)) || 'Error desconocido';
  const ayuda = /row-level security|permission|denied|JWT|not authenticated/i.test(msg)
      ? 'Parece un problema de permisos: cierra sesión y vuelve a entrar con la contraseña.'
    : /does not exist|relation|column/i.test(msg)
      ? 'Falta algo en la base de datos. Hay que ejecutar el SQL de reservas en Supabase.'
    : /fetch|network|Failed/i.test(msg)
      ? 'Parece que no hay conexión a internet.'
    : 'Toca el botón ↻ para refrescar y vuelve a intentarlo.';
  const ov=el('div','overlay');
  ov.innerHTML='<div class="modal"><div class="m-msg">⚠️ '+titulo+'</div>'+
    '<div class="m-sub">'+ayuda+'</div>'+
    '<div class="errbox">'+String(msg).replace(/</g,'&lt;')+'</div>'+
    '<div class="m-actions" style="grid-template-columns:1fr"><button class="m-btn m-ok">Entendido</button></div></div>';
  document.body.appendChild(ov);
  const close=()=>ov.remove();

  ov.querySelector('.m-ok').onclick=close;
}

function openSplitModal(){
  const m=state.active; const lines=tbl(m).lines.slice().sort((a,b)=>lineRank(a.name)-lineRank(b.name));
  if(!lines.length) return;
  const sel={}; lines.forEach(l=>sel[l.name]=0);
  const rows=lines.map(l=>
    '<div class="ex-row" data-ex="'+l.name.replace(/"/g,'&quot;')+'"><div class="ex-i"><span class="ex-n">'+l.name+'</span><span class="ex-p num">'+eur(l.price)+' · '+l.qty+' ud</span></div>'+
    '<div class="stepper"><button data-a="m">−</button><span class="q num">0</span><button data-a="p">+</button></div></div>').join('');
  const ov=el('div','overlay');
  ov.innerHTML='<div class="modal"><div class="m-msg">Cobro parcial · '+m+'</div>'+
    '<div class="m-sub">Marca lo que te pagan ahora</div>'+
    '<div class="ex-list">'+rows+'</div>'+
    '<div class="ex-total"><span class="exl">A cobrar</span><span class="ex-tv num" id="sp-tot">'+eur(0)+'</span></div>'+
    cashHTML()+
    '<div class="m-actions"><button class="m-btn m-cancel">Cancelar</button>'+
    '<button class="m-btn m-ok sp-add" disabled>Cobrado</button></div></div>';
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  const lineOf=name=>lines.find(l=>l.name===name);
  const total=()=>lines.reduce((s,l)=>s+l.price*sel[l.name],0);
  const paintCash=wireCash(ov,total);
  const paint=()=>{ const t=total(); ov.querySelector('#sp-tot').textContent=eur(t);
    ov.querySelector('.sp-add').disabled=t<=0;
    ov.querySelectorAll('.ex-row').forEach(r=>{ r.querySelector('.q').textContent=sel[r.dataset.ex]; }); paintCash(); };
  ov.querySelectorAll('.ex-row').forEach(row=>{
    const name=row.dataset.ex;
    row.querySelector('[data-a=m]').onclick=()=>{ if(sel[name]>0){ sel[name]--; paint(); } };
    row.querySelector('[data-a=p]').onclick=()=>{ if(sel[name]<lineOf(name).qty){ sel[name]++; paint(); } };
  });
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
  ov.querySelector('.m-cancel').onclick=close;
  ov.querySelector('.sp-add').onclick=async()=>{
    const items=lines.filter(l=>sel[l.name]>0).map(l=>({name:l.name,qty:sel[l.name],price:l.price}));
    if(!items.length) return;
    const tot=items.reduce((s,i)=>s+i.price*i.qty,0);
    const mm=state.active;
    const sub=tbl(mm).sub||'';
    items.forEach(i=>{ const l=tbl(mm).lines.find(x=>x.name===i.name); if(l) l.qty-=i.qty; });
    state.tables[mm].lines=state.tables[mm].lines.filter(l=>l.qty>0);
    logTicket(mm,tot,items,sub);
    close();
    if(tbl(mm).lines.length===0){ state.tables[mm].sub=''; DB.setSub(mm,''); back(); }
    else commit();
    await DB.payPartial(mm,tot,items,sub);
  };
}

/* Diálogo de extras: se abre al pedir un bocadillo/montado o combinado.
   Reglas: el 1er condimento (bacon/queso/tomate) es gratis; el resto se cobra.
   Patatas fritas se cobra siempre desde la 1ª. */
function openExtrasModal(baseName, basePrice, cat){
  const list=extrasFor(cat);
  const freeItems=list.filter(e=>e.free), paidItems=list.filter(e=>!e.free);
  const low=arr=>arr.map(e=>e.name.toLowerCase()).join('/');
  const subNote = (freeItems.length&&paidItems.length) ? ('1º de cada '+low(freeItems)+' gratis · '+low(paidItems)+' siempre')
                : freeItems.length ? '1º de cada extra gratis'
                : ('cada '+low(paidItems)+' se cobra');
  const priceOf=n=>{ const e=list.find(x=>x.name===n); return e?e.price:0; };
  const isFree=n=>{ const e=list.find(x=>x.name===n); return !!(e&&e.free); };
  let seq=[];  // unidades de extra en el orden en que se añaden
  const rows=list.map(e=>
    '<div class="ex-row" data-ex="'+e.name+'"><div class="ex-i"><span class="ex-n">'+e.name+'</span><span class="ex-p num">+'+eur(e.price)+'</span></div>'+
    '<div class="stepper"><button data-a="m">−</button><span class="q num">0</span><button data-a="p">+</button></div></div>').join('');
  const ov=el('div','overlay');
  ov.innerHTML='<div class="modal"><div class="m-msg">'+baseName+'</div>'+
    '<div class="m-sub">Base '+eur(basePrice)+' · '+subNote+'</div>'+
    '<div class="ex-list">'+rows+'</div>'+
    '<div class="ex-total"><span class="exl">Total</span><span class="ex-tv num">'+eur(basePrice)+'</span></div>'+
    '<div class="m-actions"><button class="m-btn m-cancel">Cancelar</button>'+
    '<button class="m-btn m-ok ex-add">Añadir</button></div></div>';
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  const countOf=n=> seq.filter(x=>x===n).length;
  const charged=()=>{
    let sum=0;
    list.forEach(e=>{ const c=countOf(e.name); if(c<=0) return;
      sum += e.free ? (c-1)*e.price : c*e.price; });  // 1º de CADA condimento gratis; patatas todas se cobran
    return sum;
  };
  const total=()=> basePrice + charged();
  const paint=()=>{
    ov.querySelector('.ex-tv').textContent=eur(total());
    ov.querySelectorAll('.ex-row').forEach(r=>{ r.querySelector('.q').textContent=countOf(r.dataset.ex); });
  };
  ov.querySelectorAll('.ex-row').forEach(row=>{
    const name=row.dataset.ex;
    row.querySelector('[data-a=m]').onclick=()=>{ const i=seq.lastIndexOf(name); if(i>=0){ seq.splice(i,1); paint(); } };
    row.querySelector('[data-a=p]').onclick=()=>{ seq.push(name); paint(); };
  });
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
  ov.querySelector('.m-cancel').onclick=close;

/* ================================================================
   COCINA (KDS): las comandas se derivan de la COMIDA de las mesas.
   Estado por unidad en la propia línea: km=haciendo, kl=listo, ks=servido;
   p (pendiente) = qty - km - kl - ks. Sincroniza por la tabla orders.
   ================================================================ */
let muted=false, kPrevMesas=new Set(), kInit=false, toastTimer;
const foodLines = mesa => tbl(mesa).lines.filter(l=>isKitchen(l.name));
function lineState(l){ const km=l.km||0, kl=l.kl||0, ks=l.ks||0; return {p:Math.max(0,l.qty-km-kl-ks), m:km, l:kl, s:ks}; }
function kComandas(){
  const list=[];
  state.tableList.forEach(mesa=>{
    const fl=foodLines(mesa); if(!fl.length) return;
    if(!fl.some(l=>{const s=lineState(l); return (s.p+s.m+s.l)>0;})) return;  // todo servido -> archivada
    const times=fl.map(l=>l.creada_en?new Date(l.creada_en).getTime():Date.now());
    list.push({ mesa, sub:tbl(mesa).sub, creada_en:Math.min(...times), lines:fl });
  });
  return list.sort((a,b)=>a.creada_en-b.creada_en);
}
function kAgg(c){ let p=0,m=0,l=0; c.lines.forEach(x=>{const s=lineState(x); p+=s.p;m+=s.m;l+=s.l;}); if(p+m+l===0) return 'lista'; if(m===0&&l===0) return 'pendiente'; if(p===0&&m===0) return 'lista'; return 'en_marcha'; }
const esc = s => String(s).replace(/'/g,"\\'");

async function kMove(mesa,item,from){
  const l=tbl(mesa).lines.find(x=>x.name===item); if(!l) return; l.km=l.km||0;l.kl=l.kl||0;l.ks=l.ks||0;
  const s=lineState(l);
  if(from==='p' && s.p>0){ l.km++; }
  else if(from==='m' && s.m>0){ l.km--; l.kl++; beep(1); showToast(mesa+': '+item+' LISTO — recoger', true); }
  else if(from==='l' && s.l>0){ l.kl--; l.ks++; kCheckDone(mesa); }
  kRenderBoard(); await DB.setKitchen(mesa,item,l.km,l.kl,l.ks);
}
async function kUndo(mesa,item){
  const l=tbl(mesa).lines.find(x=>x.name===item); if(!l) return; l.km=l.km||0;l.kl=l.kl||0;l.ks=l.ks||0;
  if(l.ks>0){ l.ks--; l.kl++; } else if(l.kl>0){ l.kl--; l.km++; } else if(l.km>0){ l.km--; }
  kRenderBoard(); await DB.setKitchen(mesa,item,l.km,l.kl,l.ks);
}
async function kBulk(mesa){
  const fl=foodLines(mesa); const st=kAgg({lines:fl});
  fl.forEach(l=>{ const s=lineState(l); l.km=l.km||0;l.kl=l.kl||0;l.ks=l.ks||0;
    if(st==='pendiente'){ l.km=l.km+s.p; }
    else if(st==='en_marcha'){ l.kl=l.kl+s.p+s.m; l.km=0; }
    else { l.ks=l.ks+s.l; l.kl=0; } });
  if(st==='en_marcha') showToast(mesa+' COMPLETA — servir', true);
  kRenderBoard(); for(const l of fl){ await DB.setKitchen(mesa,l.name,l.km||0,l.kl||0,l.ks||0); }
}
function kCheckDone(mesa){ const fl=foodLines(mesa); if(fl.length && fl.every(l=>(l.ks||0)>=l.qty)) showToast(mesa+' completada', false); }

function fmtTimer(ms){ const s=Math.max(0,Math.floor(ms/1000)); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function timerClass(ms){ const m=ms/60000; return m<5?'t-ok':m<8?'t-warn':'t-bad'; }
function kClockTxt(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

function unitChips(c,it){
  const s=lineState(it), m=esc(c.mesa), nm=esc(it.name); let h='';
  if(s.p>0) h+='<button class="uchip p" onclick="kMove(\''+m+'\',\''+nm+'\',\'p\')"><b>'+s.p+'</b>PDTE ▶</button>';
  if(s.m>0) h+='<button class="uchip m" onclick="kMove(\''+m+'\',\''+nm+'\',\'m\')"><b>'+s.m+'</b>HACIENDO ▶</button>';
  if(s.l>0) h+='<button class="uchip l" onclick="kMove(\''+m+'\',\''+nm+'\',\'l\')"><b>'+s.l+'</b>LISTO · SALE ▶</button>';
  if(s.s>0) h+='<span class="uchip s"><b>'+s.s+'</b>SERVIDO ✓</span>';
  h+='<button class="it-undo" onclick="kUndo(\''+m+'\',\''+nm+'\')" '+((s.m+s.l+s.s)>0?'':'disabled')+'>↩</button>';
  return h;
}
const BULK_TXT={pendiente:'EMPEZAR TODO ▶',en_marcha:'TODO LISTO ✓',lista:'SERVIR TODO'};
function orderCard(c){
  const age=Date.now()-c.creada_en, st=kAgg(c), late=st!=='lista'&&age>8*60000, m=esc(c.mesa);
  return '<div class="korder '+(late?'late':'')+'" data-s="'+st+'">'+
    '<div class="o-top"><span class="o-mesa">'+c.mesa+(c.sub?' · '+c.sub:'')+'</span>'+
      '<span class="o-timer '+timerClass(age)+'" data-t="'+c.creada_en+'">'+fmtTimer(age)+'</span></div>'+
    '<div class="o-items">'+c.lines.map(it=>'<div class="itrow '+((it.ks||0)>=it.qty?'done':'')+'"><div class="it-head"><span class="q">'+it.qty+'×</span><span class="nm">'+it.name+'</span></div><div class="units">'+unitChips(c,it)+'</div></div>').join('')+'</div>'+
    '<div class="o-act"><button class="main" onclick="kBulk(\''+m+'\')">'+BULK_TXT[st]+'</button></div></div>';
}

function kRenderBoard(){
  if(state.view!=='cocina') return;
  const comandas=kComandas();
  const cur=new Set(comandas.map(c=>c.mesa));
  if(kInit){ for(const mm of cur){ if(!kPrevMesas.has(mm)){ beep(2); break; } } }
  kPrevMesas=cur; kInit=true;
  const pend=comandas.filter(c=>kAgg(c)==='pendiente'), mar=comandas.filter(c=>kAgg(c)==='en_marcha'), lis=comandas.filter(c=>kAgg(c)==='lista');
  const setCol=(id,arr,emp)=>{ const e=document.getElementById(id); if(e) e.innerHTML=arr.map(orderCard).join('')||'<div class="empty">'+emp+'</div>'; };
  setCol('colPend',pend,'Sin comandas pendientes'); setCol('colMar',mar,'Nada en marcha'); setCol('colLis',lis,'Nada listo aún');
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
  set('nPend',pend.length); set('nMar',mar.length); set('nLis',lis.length);
  let up=0,um=0,ul=0; comandas.forEach(c=>c.lines.forEach(it=>{const s=lineState(it); up+=s.p;um+=s.m;ul+=s.l;}));
  set('kPend',up); set('kMar',um); set('kLis',ul);
  const agg={}; comandas.forEach(c=>c.lines.forEach(it=>{const s=lineState(it); if(s.p>0) agg[it.name]=(agg[it.name]||0)+s.p;}));
  const tags=Object.entries(agg).sort((a,b)=>b[1]-a[1]); const pl=document.getElementById('prodline');
  if(pl) pl.innerHTML = tags.length ? '<span class="pl-lbl">EN COLA</span>'+tags.map(([n,q])=>'<span class="pl-tag"><b>'+q+'</b>'+n+'</span>').join('') : '';
}

/* sonido + toast */
function beep(times){ if(muted) return; try{ const ctx=new (window.AudioContext||window.webkitAudioContext)();
  for(let i=0;i<(times||1);i++){ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;o.type='sine'; const t=ctx.currentTime+i*0.18; g.gain.setValueAtTime(.25,t); g.gain.exponentialRampToValueAtTime(.001,t+.14); o.start(t);o.stop(t+.15); } }catch(e){} }
function showToast(msg,brand){ let t=document.getElementById('kds-toast'); if(!t){ t=el('div'); t.id='kds-toast'; document.body.appendChild(t); }
  t.textContent=msg; t.className=brand?'brand':''; t.classList.add('on'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('on'),2600); }

/* cronómetros + reloj (solo actúan en la vista cocina) */
setInterval(()=>{ document.querySelectorAll('.o-timer').forEach(e=>{ const age=Date.now()-(+e.dataset.t); e.textContent=fmtTimer(age); e.className='o-timer '+timerClass(age); });
  const c=document.getElementById('kClock'); if(c) c.textContent=kClockTxt(); },1000);

async function loadProductos(list){
  const now=new Date(); const since=new Date(now);
  if(state.prodPeriod==='dia'){ since.setHours(0,0,0,0); }
  else if(state.prodPeriod==='semana'){ const d=(now.getDay()+6)%7; since.setDate(now.getDate()-d); since.setHours(0,0,0,0); }
  else { since.setDate(1); since.setHours(0,0,0,0); }
  let tickets;
  if(state.prodPeriod==='dia' || !CLOUD){ tickets=state.tickets; }
  else {
    let r=await sb.from('tickets').select('items').gte('closed_at', since.toISOString());
    if(r.error) r=await sb.from('tickets').select('total').gte('closed_at', since.toISOString());
    tickets=(r.data||[]).map(x=>({items:x.items||[]}));
  }
  renderProdList(list,tickets);
}
function renderProdList(list,tickets){
  const agg={};
  tickets.forEach(t=>(t.items||[]).forEach(i=>{ const base=canonical(i.name); agg[base]=(agg[base]||0)+i.qty; }));
  const beb=[],com=[],kio=[];
  Object.keys(agg).forEach(name=>{
    const bucket = KIOSKO_CATS.includes(ITEM_CAT[name]) ? kio : (ITEM_TYPE[name]==='bebidas'?beb:com);
    bucket.push({name,qty:agg[name]});
  });
  const bySold=(a,b)=>b.qty-a.qty || a.name.localeCompare(b.name,'es'); beb.sort(bySold); com.sort(bySold); kio.sort(bySold);
  if(!beb.length && !com.length && !kio.length){ list.innerHTML='<div class="empty">Sin ventas en este periodo.</div>'; return; }
  const sec=(title,arr)=> arr.length ? ('<div class="psec"><h3 class="display">'+title+'</h3>'+arr.map(r=>'<div class="prow"><span class="pn">'+r.name+'</span><span class="pq num">'+r.qty+'</span></div>').join('')+'</div>') : '';
  list.innerHTML=sec('Bebidas',beb)+sec('Comida',com)+sec('Kiosko',kio);
}

    '<div class="actions"><button class="btn btn-clear" id="c-clear">Vaciar</button><button class="btn btn-pay" id="c-pay">Cobrado</button></div>');
  foot.querySelector('#c-clear').onclick=clearTable;
  foot.querySelector('#c-pay').onclick=payTable;
  foot.querySelector('#c-split').onclick=openSplitModal;
  right.appendChild(foot);
  wrap.appendChild(left); wrap.appendChild(right);
  main.appendChild(wrap);
  renderAddPane(); renderCuenta();
}

function renderHeaderBoard(hdr){
  const h=el('div','hb', '<button class="logo">'+MILL+
    '<div class="brand"><span class="t1 display">BAR PISCINA</span><span class="t2 display">MOTA DEL CUERVO</span></div></button>'+
    REFRESH_BTN+
    '<button class="caja">'+dotHTML()+'<div style="display:flex;flex-direction:column;line-height:1.1"><span class="cl">CAJA HOY</span><span class="cv num">'+eur(state.caja.total)+'</span></div>'+
    '<span class="cc">'+state.caja.count+' tickets</span><span class="cchev">›</span></button>');
  h.querySelector('.logo').onclick=openMenu;
  h.querySelector('.caja').onclick=openReport;
  hdr.appendChild(h);
}
function renderBoard(main){
  const head=el('div','board-head','<span class="board-title">MESAS</span>');
  const et=el('button','edit-toggle', state.editMesas?'Hecho':'Editar');
  et.onclick=toggleEditMesas; head.appendChild(et);
  main.appendChild(head);
  const g=el('div','grid');
  state.tableList.forEach(n=>{
    const tot=tTotal(n), sub=tbl(n).sub;
    const b=el('button','mesa'+(tot>0?' has':'')+(state.editMesas?' editing':''),
      (state.editMesas?'<span class="mdel">✕</span>':'')+
      '<div class="mtop"><span class="mname display">'+n+'</span>'+(tot>0?'<span class="mtot num">'+eur(tot)+'</span>':'')+'</div>'+
      (sub?'<div class="msub">'+sub+'</div>':''));
    b.onclick = state.editMesas ? (()=>askDeleteMesa(n)) : (()=>openTable(n));
    g.appendChild(b);
  });
  if(!state.editMesas){ const add=el('button','mesa add','<span class="plus">+</span><span class="al">Añadir mesa</span>'); add.onclick=addTable; g.appendChild(add); }
  main.appendChild(g);
}

function renderHeaderTable(hdr){
  const n=state.active, sub=tbl(n).sub;
  const h=el('div','ht',
    '<button class="back">←</button>'+
    '<div class="thead"><span class="tname display">'+n+'</span>'+
    '<input class="tsub" placeholder="Añadir nombre (p. ej. sombrilla 4)" value="'+sub.replace(/"/g,'&quot;')+'"></div>'+
    '<span class="ttot num" id="ht-tot">'+eur(tTotal(n))+'</span>'+dotHTML());
  h.querySelector('.back').onclick=back;
  h.querySelector('.tsub').oninput=e=>setSub(e.target.value);
  hdr.appendChild(h);
}
function renderTableShell(main){
  const seg=el('div','seg','<button data-t="cuenta">Cuenta</button><button data-t="add">Añadir</button>');
  seg.querySelector('[data-t=cuenta]').onclick=()=>setTab('cuenta');
  seg.querySelector('[data-t=add]').onclick=()=>setTab('add');
  main.appendChild(seg);
  main.appendChild(el('div','', '<div id="tbody"></div>'));
}
function renderTableBody(){
  document.querySelectorAll('.seg button').forEach(b=>b.classList.toggle('on', b.dataset.t===state.tab));
  const body=document.getElementById('tbody'); body.innerHTML='';
  if(state.tab==='cuenta') renderCuentaInto(body); else renderAddInto(body);
}

/* ----- Cuenta ----- */
function renderCuentaInto(body){
  const pane=el('div','pane'); pane.id='cuenta-pane'; body.appendChild(pane);
  const foot=el('div','foot',
    '<div class="total"><span class="tl">TOTAL</span><span class="tv num" id="c-total">'+eur(tTotal(state.active))+'</span></div>'+
    '<button class="btn btn-split" id="c-split">Cobrar solo una parte</button>'+
    '<div class="actions"><button class="btn btn-clear" id="c-clear">Vaciar</button><button class="btn btn-pay" id="c-pay">Cobrado</button></div>');
  body.appendChild(foot);
  foot.querySelector('#c-clear').onclick=clearTable;
  foot.querySelector('#c-pay').onclick=payTable;
  foot.querySelector('#c-split').onclick=openSplitModal;
  renderCuenta();
}
function renderCuenta(){
  const pane=document.getElementById('cuenta-pane'); if(!pane)return; pane.innerHTML='';
  const arr=tbl(state.active).lines.slice().sort((a,b)=>lineRank(a.name)-lineRank(b.name));
  if(!arr.length){ pane.appendChild(el('div','empty','Aún no hay nada en esta cuenta.<br>Ve a «Añadir» para empezar.')); }
  else arr.forEach(l=>{
    const row=el('div','line',
      '<div class="li"><div class="ln">'+l.name+'</div><div class="lp num">'+eur(l.price)+' / ud</div></div>'+
      '<div class="stepper"><button data-a="m">−</button><span class="q num">'+l.qty+'</span><button data-a="p">+</button></div>'+
      '<div class="lsub num">'+eur(l.price*l.qty)+'</div><button class="del" data-a="d">✕</button>');
    row.querySelector('[data-a=m]').onclick=()=>stepItem(l.name,-1);
    row.querySelector('[data-a=p]').onclick=()=>stepItem(l.name,1);
    row.querySelector('[data-a=d]').onclick=()=>removeItem(l.name);
    pane.appendChild(row);
  });
  const tot=tTotal(state.active);
  const ct=document.getElementById('c-total'); if(ct) ct.textContent=eur(tot);
  const cp=document.getElementById('c-pay'); if(cp) cp.disabled=tot<=0;
  const cc=document.getElementById('c-clear'); if(cc) cc.disabled=tot<=0;
  const cs=document.getElementById('c-split'); if(cs) cs.disabled=tot<=0;
  const ht=document.getElementById('ht-tot'); if(ht) ht.textContent=eur(tot);
}

/* ----- Añadir ----- */
function renderAddInto(body){
  const fb=el('div','fb','<button data-fb="comida">Comida</button><button data-fb="bebidas">Bebidas</button>');
  fb.querySelector('[data-fb=comida]').onclick=()=>setFb('comida');
  fb.querySelector('[data-fb=bebidas]').onclick=()=>setFb('bebidas');
  body.appendChild(fb);
  body.appendChild(el('div','acc-wrap','<div id="acc-list"></div>'));
  const foot=el('div','foot',
    '<div class="total"><span class="tl">TOTAL MESA</span><span class="tv num" id="a-total">'+eur(tTotal(state.active))+'</span></div>'+
    '<div class="actions" style="grid-template-columns:1fr"><button class="btn btn-view" id="a-view">Ver cuenta ▸</button></div>');
  body.appendChild(foot);
  foot.querySelector('#a-view').onclick=()=>setTab('cuenta');
  renderAddPane();
}
function renderAddPane(){
  document.querySelectorAll('.fb button').forEach(b=>b.classList.toggle('on', b.dataset.fb===state.fb));
  const list=document.getElementById('acc-list'); if(!list)return; list.innerHTML='';
  const groups=MENU[state.fb].groups; const lines=tbl(state.active).lines;
  const qtyOf=name=>{ const l=lines.find(x=>x.name===name); return l?l.qty:0; };
  Object.keys(groups).forEach(cat=>{
    const acc=el('div','acc'+(state.openCat===cat?' open':'')); acc.dataset.cat=cat;
    const head=el('button','acc-h','<span>'+cat+'</span><span class="chev">▶</span>');
    head.onclick=()=>toggleCat(cat);
    const bodyEl=el('div','acc-body');
    groups[cat].forEach(([name,price])=>{
      const q=qtyOf(name);
      const it=el('button','acc-item'+(q>0?' in':''),
        '<span class="ain">'+name+'</span><span class="aip num">'+eur(price)+'</span><span class="badge num">'+q+'</span>');
      it.dataset.name=name;
      it.onclick = WITH_EXTRAS.includes(cat) ? (()=>openExtrasModal(name,price,cat)) : (()=>addItem(name,price));
      bodyEl.appendChild(it);
    });
    acc.appendChild(head); acc.appendChild(bodyEl); list.appendChild(acc);
  });
  updateFoot();
}
function refreshBadges(){
  const lines=tbl(state.active).lines;
  document.querySelectorAll('.acc-item').forEach(it=>{
    const l=lines.find(x=>x.name===it.dataset.name); const q=l?l.qty:0;
    it.classList.toggle('in',q>0); const b=it.querySelector('.badge'); if(b) b.textContent=q;
  });
}
/* refresca lo que esté visible tras un cambio (vale para móvil y escritorio) */
function commit(){ renderCuenta(); refreshBadges(); updateFoot(); }
function updateFoot(){
  const tot=tTotal(state.active);
  const a=document.getElementById('a-total'); if(a) a.textContent=eur(tot);
  const ht=document.getElementById('ht-tot'); if(ht) ht.textContent=eur(tot);
}

/* ================================================================
   6) Arranque
   ================================================================ */
/* ================================================================
   ACCESO — usuario y contraseña (Supabase Auth)
   La sesión dura hasta el día 1 del mes siguiente; entonces
   vuelve a pedir la contraseña una sola vez.
   ================================================================ */
const AUTH_KEY='bar-mota-auth-mes', MAIL_KEY='bar-mota-usuario';
const curMonth=()=>new Date().toISOString().slice(0,7);

async function ensureAuth(){
  if(!CLOUD || !sb) return true;                       // modo local: sin acceso
  if(!PEDIR_CONTRASENA) return true;                   // interruptor de emergencia
  let session=null;
  try{ session=(await sb.auth.getSession()).data.session; }catch(e){}
  const mes=localStorage.getItem(AUTH_KEY);
  if(session && mes===curMonth()) return true;         // sesión válida este mes
  if(session){ try{ await sb.auth.signOut(); }catch(e){} }   // mes nuevo -> a pedir
  return showLogin();
}

function showLogin(){
  return new Promise(resolve=>{
    const fijo=!!USUARIO_FIJO;
    const mail=localStorage.getItem(MAIL_KEY)||USUARIO_SUGERIDO;
    const scr=el('div','loginscr');
    scr.innerHTML='<div class="loginbox">'+MILL_BLUE+
      '<div class="lg-t display">BAR PISCINA</div><div class="lg-s">MOTA DEL CUERVO</div>'+
      (fijo?'':'<label class="lgf"><span>Usuario</span><input class="lg-mail" type="text" autocapitalize="none" autocorrect="off" autocomplete="username" placeholder="tu usuario" value="'+mail.replace(/"/g,'&quot;')+'"></label>')+
      '<label class="lgf"><span>Contraseña</span><input class="lg-pass" type="password" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" data-lpignore="true" placeholder="Escribe la contraseña"></label>'+
      '<div class="lg-err" id="lgErr"></div>'+
      '<button class="lg-ok">Entrar</button>'+
      '<div class="lg-note">No se volverá a pedir hasta el mes que viene.</div></div>';
    document.body.appendChild(scr);
    const mailI=scr.querySelector('.lg-mail'), passI=scr.querySelector('.lg-pass'),
          btn=scr.querySelector('.lg-ok'), err=scr.querySelector('#lgErr');
    setTimeout(()=>{ passI.value=''; passI.focus(); },250);
    const go=async()=>{
      let escrito=USUARIO_FIJO;
      if(!fijo){
        const v=(mailI.value||'').trim();
        if(!v){ err.textContent='Escribe tu usuario.'; return; }
        escrito = (v.includes('@') ? v : v + DOMINIO_USUARIO).toLowerCase();
      }
      const password=passI.value;
      if(!password){ err.textContent='Escribe la contraseña.'; passI.focus(); return; }
      btn.disabled=true; btn.textContent='Entrando…'; err.textContent='';
      const intentos=[escrito].concat(CUENTAS_ALTERNATIVAS.map(c=>c.toLowerCase()).filter(c=>c!==escrito));
      let ultimo=null;
      for(const email of intentos){
        try{
          const { error }=await sb.auth.signInWithPassword({ email, password });
          if(!error){
            localStorage.setItem(AUTH_KEY,curMonth());
            if(!fijo) localStorage.setItem(MAIL_KEY,(mailI.value||'').trim());
            scr.remove(); resolve(true); return;
          }
          ultimo=error;
        }catch(e){ ultimo={message:'sin conexion'}; break; }
      }
      const msg=(ultimo&&ultimo.message)||'';
      err.innerHTML = /sin conexion|fetch|network|Failed/i.test(msg)
        ? 'Sin conexión. Revisa el internet.'
        : 'Usuario o contraseña incorrectos.<br><span class="lg-hint">Revisa en Supabase → Authentication → Users que el usuario existe y está confirmado.</span>';
      btn.disabled=false; btn.textContent='Entrar'; passI.value=''; passI.focus();
    };
    btn.onclick=go;
    [mailI,passI].forEach(i=>{ if(i) i.addEventListener('keydown',e=>{ if(e.key==='Enter') go(); }); });
  });
}

/* ================================================================
   6) Arranque
   ================================================================ */
(async function init(){
  if(CLOUD){ try{ sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY); }catch(e){} }
  await ensureAuth();
  await DB.load();
  renderApp();
  DB.subscribe(scheduleSync);
  setTimeout(()=>avisoReservasHoy(false),600);   // recordatorio de las reservas de hoy
})();

/* si se redimensiona la ventana y cambia móvil<->escritorio, re-render */
let rzTimer=null;
window.addEventListener('resize', ()=>{ clearTimeout(rzTimer); rzTimer=setTimeout(()=>{
  const now=window.matchMedia('(min-width:900px)').matches;
  if(now!==isDesktop){ isDesktop=now; renderApp(); }
},150); });
</script>
